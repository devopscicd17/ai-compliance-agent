name: Build and Deploy to OpenShift

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  APP_NAME: ai-compliance-agent

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set Image Name
        run: |
          IMAGE_NAME=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Install OpenShift CLI
        uses: redhat-actions/oc-installer@v1

      - name: Login to OpenShift
        run: |
          oc login \
            --server=${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }}

      - name: Select Project
        run: |
          oc project ${{ secrets.OPENSHIFT_PROJECT }}

      - name: Check if Deployment Exists
        id: check
        run: |
          if oc get deployment $APP_NAME >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      #################################################################
      # First deployment
      #################################################################

      - name: Create Application
        if: steps.check.outputs.exists == 'false'
        run: |
          oc new-app $IMAGE_NAME:latest --name=$APP_NAME

          oc expose service/$APP_NAME || true

      #################################################################
      # Existing deployment
      #################################################################

      - name: Update Image
        if: steps.check.outputs.exists == 'true'
        run: |
          CONTAINER=$(oc get deployment $APP_NAME \
            -o jsonpath='{.spec.template.spec.containers[0].name}')

          echo "Container = $CONTAINER"

          oc set image deployment/$APP_NAME \
            $CONTAINER=$IMAGE_NAME:${{ github.sha }}

      #################################################################
      # Wait until rollout completes
      #################################################################

      - name: Wait for Rollout
        run: |
          if ! oc rollout status deployment/$APP_NAME --timeout=300s; then
            echo "Rollout failed."
            oc rollout undo deployment/$APP_NAME || true
            exit 1
          fi

      #################################################################
      # Verify deployment
      #################################################################

      - name: Verify Resources
        run: |
          echo "Deployments"
          oc get deployment

          echo ""
          echo "Pods"
          oc get pods

          echo ""
          echo "Services"
          oc get svc

          echo ""
          echo "Routes"
          oc get route

      #################################################################
      # Print application URL
      #################################################################

      - name: Print Application URL
        run: |
          ROUTE=$(oc get route $APP_NAME -o jsonpath='{.spec.host}')

          echo ""
          echo "==========================================="
          echo "Deployment Successful!"
          echo ""
          echo "Application URL:"
          echo "https://$ROUTE"
          echo "==========================================="

      #################################################################
      # Deployment summary
      #################################################################

      - name: GitHub Summary
        run: |
          {
            echo "## OpenShift Deployment"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Application | $APP_NAME |"
            echo "| Image | $IMAGE_NAME:${{ github.sha }} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| URL | https://$(oc get route $APP_NAME -o jsonpath='{.spec.host}') |"
          } >> $GITHUB_STEP_SUMMARY
